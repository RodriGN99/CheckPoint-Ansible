[defaults]
inventory            = inventories/lab/hosts.ini
host_key_checking    = False
retry_files_enabled  = False
stdout_callback      = yaml
interpreter_python   = auto_silent
force_color          = True

[persistent_connection]
# Las llamadas a la Management API pueden ser lentas (publish, install-policy).
# Con los valores por defecto (30s) se cortan conexiones httpapi a mitad.
command_timeout = 300
connect_timeout = 120
