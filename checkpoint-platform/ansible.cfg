[defaults]
inventory            = inventories/lab/hosts.ini
host_key_checking    = False
retry_files_enabled  = False
# El antiguo callback 'community.general.yaml' se elimino en community.general 12.
# Su sustituto oficial desde ansible-core 2.13 es result_format=yaml sobre el
# callback 'default'.
stdout_callback      = default
result_format        = yaml
interpreter_python   = auto_silent
force_color          = True

[persistent_connection]
# Las llamadas a la Management API pueden ser lentas (publish, install-policy).
# Con los valores por defecto (30s) se cortan conexiones httpapi a mitad.
command_timeout = 300
connect_timeout = 120
