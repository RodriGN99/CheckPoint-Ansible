# Lab EVE-NG - Check Point R81.20
# Scope: SOLO Check Point (SMS + ClusterXL).
# Fuera de scope a proposito: FortiGate, Cisco C9K, ArubaCX, clientes Windows/Docker.
#
# Los nombres de host coinciden con el hostname real de Gaia.
# Mapeo con las etiquetas del diagrama EVE-NG (ojo, el orden despista):
#   cp-gw-a  ->  "CP Bound 2"
#   cp-gw-b  ->  "CP Bound 1"
#
# El grupo se llama [management] (no [sms]) para no colisionar con el host 'sms'
# (Ansible avisa cuando grupo y host comparten nombre). Los plays siguen
# apuntando al host con 'hosts: sms'; las credenciales de la Management API
# cuelgan de group_vars/management.yml.

[management]
sms       ansible_host=192.168.90.170

[gateways]
cp-gw-a   ansible_host=192.168.90.171
cp-gw-b   ansible_host=192.168.90.172

[checkpoint:children]
management
gateways
