---
# Definicion logica del ClusterXL.
#
# Vive en group_vars/all (y no en 'gateways') porque el objeto cluster se crea
# atacando al SMS via Management API: el play que lo consume tiene hosts=sms,
# asi que necesita ver estas vars.
#
# Alimenta a check_point.mgmt.cp_mgmt_simple_cluster.
# Los miembros se construyen en el playbook a partir de los host_vars del grupo
# 'gateways' (clave cp_member).
#
# =============================================================================
# OJO CON EL NOMBRE: el cluster YA EXISTE en el SMS como "CP-CLUSTER-HA".
# cp_mgmt_simple_cluster identifica el objeto por 'name': si se pone otro nombre,
# no gestiona el existente, CREA UNO NUEVO duplicado con la misma VIP.
#
# A VERIFICAR (no bloqueante, pero son desajustes reales entre miembros vistos
# en el Gaia Portal):
#
#   1. El bond se llama 'bond2' en CP-GW-A y 'bond1' en CP-GW-B.
#      ClusterXL espera nombres de interfaz identicos en ambos miembros.
#      Estos ficheros asumen que se unifica a 'bond1'.
#
#   2. eth3 (sync): CP-GW-A esta en /29 (255.255.255.248) y CP-GW-B en /30
#      (255.255.255.252). Deberian ser la misma subred con la misma mascara.
#
# Comprobar con 'cphaprob -a if' en ambos miembros UNA VEZ RESUELTAS LAS
# LICENCIAS. Con CP-GW-A sin licencia el cluster no llega a formarse, asi que
# un posible mismatch de interfaces no se habria manifestado todavia.
# =============================================================================

cp_cluster:
  name: "CP-CLUSTER-HA"             # nombre REAL del objeto en el SMS, no tocar
  ip_address: "192.168.90.173"      # VIP externa del cluster (red 90)
  cluster_mode: "cluster-xl-ha"     # HA activo/standby
  cluster_version: "R81.20"

  # Interfaces a nivel de CLUSTER (roles y VIPs).
  # Valores validos de interface_type: cluster | sync | "cluster + sync" | private
  interfaces:
    - name: eth0
      interface_type: cluster
      ip_address: "192.168.90.173"
      network_mask: "255.255.255.0"
      anti_spoofing: false          # lab: desactivado para no cortar trafico de pruebas

    - name: eth3
      interface_type: sync          # cable directo entre miembros (10.255.255.0/30)

    - name: eth4
      interface_type: private       # OOB (VLAN 920), solo gestion
      # Confirmado: no aparece en 'cphaprob -a if' porque ClusterXL no
      # monitoriza las interfaces private. Es lo esperado.

    # --- Interior hacia ArubaCX ---
    # Nombres y VIPs confirmados con 'cphaprob -a if' en CP-GW-A:
    #   Virtual cluster interfaces: eth0 .90.173 | bond2.10 .10.1 | bond2.99 .99.1
    # OJO: la topologia del cluster usa el naming de CP-GW-A (bond2.x), aunque
    # CP-GW-B tenga fisicamente bond1.x. Asi esta en el SMS y asi funciona;
    # no lo cambiamos desde aqui.
    - name: bond2.10
      interface_type: cluster
      ip_address: "192.168.10.1"
      network_mask: "255.255.255.0"
      anti_spoofing: false

    - name: bond2.99
      interface_type: cluster
      ip_address: "192.168.99.1"
      network_mask: "255.255.255.0"
      anti_spoofing: false

  # Blades. Arrancamos con lo minimo: solo firewall.
  # Verificados en la doc del modulo. 'vpn' existe en simple_gateway pero no lo
  # he podido confirmar en simple_cluster: no lo pongo hasta comprobarlo.
  blades:
    firewall: true
    ips: false
    application_control: false
    url_filtering: false
    anti_bot: false
    anti_virus: false
    threat_emulation: false
