---
# Definicion logica del ClusterXL.
#
# Vive en group_vars/all (y no en 'gateways') porque el objeto cluster se crea
# atacando al SMS via Management API: el play que lo consume tiene hosts=sms,
# asi que necesita ver estas vars.
#
# Alimenta a check_point.mgmt.cp_mgmt_simple_cluster.
# Los miembros se construyen en el playbook a partir de los host_vars del grupo
# 'gateways' (clave cp_member).
#
# =============================================================================
# OJO CON EL NOMBRE: el cluster YA EXISTE en el SMS como "CP-CLUSTER-HA".
# cp_mgmt_simple_cluster identifica el objeto por 'name': si se pone otro nombre,
# no gestiona el existente, CREA UNO NUEVO duplicado con la misma VIP.
#
# RESUELTO (23/07/2026), se deja constancia porque este bloque decia lo contrario:
#
#   1. Bonds: 'bond2' en CP-GW-A y 'bond1' en CP-GW-B. NO se unifica. La
#      topologia del cluster en el SMS usa el naming de CP-GW-A (bond2.x) y
#      funciona asi. Este fichero lo calca a proposito.
#
#   2. eth3 (sync): CP-GW-B estaba en /30 y se unifico a /29. Los dos miembros
#      y el SMS coinciden ya.
# =============================================================================

cp_cluster:
  name: "CP-CLUSTER-HA"             # nombre REAL del objeto en el SMS, no tocar
  ip_address: "192.168.90.173"      # VIP externa del cluster (red 90)
  cluster_mode: "cluster-xl-ha"     # HA activo/standby
  cluster_version: "R81.20"

  # Interfaces a nivel de CLUSTER (roles y VIPs).
  # Valores validos de interface_type: cluster | sync | "cluster + sync" | private
  interfaces:
    - name: eth0
      interface_type: cluster
      ip_address: "192.168.90.173"
      network_mask: "255.255.255.0"
      anti_spoofing: false          # lab: desactivado para no cortar trafico de pruebas

    # Sync: cable directo entre miembros, red 10.255.255.0/29.
    # La IP y la mascara son las que el SMS ya tiene registradas (verificado con
    # 00-discovery el 22/07/2026). Sin declararlas, cp_mgmt_simple_cluster las
    # borraria al ser declarativo.
    # Nota: la mascara de CP-GW-B estaba en /30 en Gaia y se unifico a /29, asi
    # que ahora los dos miembros y el SMS coinciden.
    - name: eth3
      interface_type: sync
      ip_address: "10.255.255.3"
      network_mask: "255.255.255.248"   # /29

    # eth4 (OOB, VLAN 920) NO se declara a proposito.
    # Existe en Gaia (192.168.92.12 / .13) pero el objeto cluster del SMS no la
    # tiene, y esa interfaz no esta conectada a nada. Declararla aqui NO seria un
    # no-op: la añadiria a la topologia del SMS. Se deja fuera para que este
    # fichero calque el estado real del SMS.

    # --- Interior hacia ArubaCX ---
    # Nombres y VIPs confirmados con 'cphaprob -a if' en CP-GW-A:
    #   Virtual cluster interfaces: eth0 .90.173 | bond2.10 .10.1 | bond2.99 .99.1
    # OJO: la topologia del cluster usa el naming de CP-GW-A (bond2.x), aunque
    # CP-GW-B tenga fisicamente bond1.x. Asi esta en el SMS y asi funciona;
    # no lo cambiamos desde aqui.
    - name: bond2.10
      interface_type: cluster
      ip_address: "192.168.10.1"
      network_mask: "255.255.255.0"
      anti_spoofing: false

    - name: bond2.99
      interface_type: cluster
      ip_address: "192.168.99.1"
      network_mask: "255.255.255.0"
      anti_spoofing: false

  # Blades. Arrancamos con lo minimo: solo firewall.
  # 'vpn' CONFIRMADO en simple_cluster (leido del objeto real con
  # cp_mgmt_simple_cluster_facts el 23/07/2026: vpn=False). Se declara a false
  # de forma explicita: no se usa VPN ni en lab ni en produccion, y enviarlo
  # hace que 'equals' lo compare y avise si alguien lo activa a mano.
  blades:
    firewall: true
    vpn: false
    ips: false
    application_control: false
    url_filtering: false
    anti_bot: false
    anti_virus: false
    threat_emulation: false
