---
# =============================================================================
# Politica de acceso: reglas gestionadas por Ansible.
# =============================================================================
# Lo consume playbooks/03-policy.yml, que ataca al SMS (hosts: sms). Por eso
# vive en group_vars/all, igual que cluster.yml y objects.yml.
#
# AHORA MISMO NO HAY NINGUNA REGLA DECLARADA, y es deliberado: el playbook no
# debe crear nada por si solo. Se probo con una regla de humo (un accept
# any/any/any) el 23/07/2026, se comprobo que aparecia en SmartConsole y se
# borro. El ciclo quedo verificado en las dos direcciones: crear -> idempotente
# -> borrar -> idempotente.
#
# Al anadir reglas de verdad, dos avisos:
#
#   1. NUNCA un 'accept any/any' que sobreviva a un install-policy: abre el
#      firewall entero. La capa 'Network' ya tiene implicit-cleanup-action:
#      drop, asi que lo que no se permite explicitamente se cae solo.
#
#   2. Con varias reglas el ORDEN decide que se permite. Usar
#      'relative_position' (above/below, respecto a una regla con nombre) en vez
#      de 'position: top|bottom', que es posicional y fragil.
# =============================================================================

# Estado declarativo de las reglas: present | absent
cp_policy_state: present

# Paquete y capa reales del SMS, leidos con cp_mgmt_package_facts (23/07/2026).
# La capa 'Network' tiene implicit-cleanup-action: drop.
cp_policy_package: "Standard"
cp_policy_layer: "Network"

# Vacia a proposito. Formato de cada entrada:
#
#   - name: "..."                  # identifica el objeto: cambiarlo crea otro
#     relative_position:           # preferible a 'position'
#       below: "nombre-de-otra-regla"
#     source: ["..."]
#     destination: ["..."]
#     service: ["..."]
#     action: "Accept"             # Accept | Drop | Reject | ...
#     enabled: true
#     track: "Log"
#     comments: "..."
cp_access_rules: []
